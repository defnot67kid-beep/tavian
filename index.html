<script>
// ============================================
// TAVIAN PLATFORM - UPDATED WITH TOAST NOTIFICATIONS
// ============================================

// Toast notification system (replaces alerts)
function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast-notification ${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

// API Configuration
const API_URL = 'https://tavian-api.onrender.com/api';

// Format number with K/M suffix
function formatTavix(amount){
    if(amount >= 1000000) return (amount / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
    if(amount >= 1000) return (amount / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
    return amount.toString();
}

// USER SYSTEM
let currentUser = null;
let allUsers = [];

// Toast notification helper
function showError(message) { showToast(message, 'error'); }
function showSuccess(message) { showToast(message, 'success'); }
function showInfo(message) { showToast(message, 'info'); }

// Token Management
function setAuthToken(token) {
    if (!token) return;
    localStorage.setItem('tavian_auth_token', token);
    localStorage.setItem('TAVIOSECURITY', token);
    document.cookie = `tavian_token=${token}; path=/; max-age=2592000`;
    document.cookie = `TAVIOSECURITY=${token}; path=/; max-age=2592000`;
}

function getAuthToken() {
    let token = localStorage.getItem('TAVIOSECURITY');
    if (token) return token;
    token = localStorage.getItem('tavian_auth_token');
    if (token) return token;
    return null;
}

function clearAuthToken() {
    localStorage.removeItem('tavian_auth_token');
    localStorage.removeItem('TAVIOSECURITY');
    localStorage.removeItem('tavian_user_backup');
    sessionStorage.removeItem('tavian_token');
    document.cookie = 'tavian_token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
    document.cookie = 'TAVIOSECURITY=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
}

function backupUserData(user) {
    if (user) {
        localStorage.setItem('tavian_user_backup', JSON.stringify(user));
    }
}

function getBackupUser() {
    const backup = localStorage.getItem('tavian_user_backup');
    if (backup) {
        try {
            return JSON.parse(backup);
        } catch(e) {
            return null;
        }
    }
    return null;
}

function isLoggedIn() {
    return currentUser !== null && getAuthToken() !== null;
}

// API Calls
async function fetchAllUsers(){
    try{
        const response = await fetch(`${API_URL}/users`, { credentials: 'include' });
        if(response.ok){
            allUsers = await response.json();
            return allUsers;
        }
    }catch(e){ console.error(e); }
    return [];
}

async function getCurrentUserFromAPI(){
    try{
        const token = getAuthToken();
        if (!token) return null;
        
        const response = await fetch(`${API_URL}/me`, { 
            credentials: 'include',
            headers: {
                'Authorization': `Bearer ${token}`,
                'X-Tavian-Token': token
            }
        });
        if(response.ok){
            currentUser = await response.json();
            backupUserData(currentUser);
            return currentUser;
        } else {
            clearAuthToken();
        }
    }catch(e){}
    return null;
}

async function autoLogin(){
    const savedToken = getAuthToken();
    
    if (savedToken) {
        try {
            const response = await fetch(`${API_URL}/me`, {
                headers: {
                    'Authorization': `Bearer ${savedToken}`,
                    'X-Tavian-Token': savedToken
                },
                credentials: 'include'
            });
            
            if (response.ok) {
                currentUser = await response.json();
                backupUserData(currentUser);
                showSuccess(`Welcome back, ${currentUser.displayName || currentUser.username}!`);
                return true;
            } else {
                clearAuthToken();
            }
        } catch(e) {}
    }
    
    try{
        const response = await fetch(`${API_URL}/auto-login`, {
            method: 'GET',
            credentials: 'include'
        });
        
        if(response.ok){
            const data = await response.json();
            if(data.success && data.user){
                currentUser = data.user;
                backupUserData(currentUser);
                if (data.token) setAuthToken(data.token);
                showSuccess(`Welcome back, ${currentUser.displayName || currentUser.username}!`);
                return true;
            }
        }
    } catch(e){}
    
    const backupUser = getBackupUser();
    if (backupUser) {
        currentUser = backupUser;
        refreshUserData();
        return true;
    }
    
    return false;
}

async function refreshUserData() {
    try {
        const token = getAuthToken();
        if (!token) return;
        
        const response = await fetch(`${API_URL}/me`, {
            credentials: 'include',
            headers: { 'Authorization': token ? `Bearer ${token}` : '' }
        });
        if (response.ok) {
            const freshUser = await response.json();
            currentUser = freshUser;
            backupUserData(freshUser);
            updateTavixDisplay();
            updateNotifications();
            if (document.getElementById("profilePage").style.display === "block") {
                renderProfile();
            }
        }
    } catch(e) {}
}

async function loginAPI(username, password){
    try{
        clearAuthToken();
        
        const response = await fetch(`${API_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ username, password })
        });
        
        if(response.ok){
            currentUser = await response.json();
            backupUserData(currentUser);
            
            let token = document.cookie.match(/tavian_token=([^;]+)/)?.[1];
            if (token) setAuthToken(token);
            
            showSuccess(`Welcome, ${currentUser.displayName || currentUser.username}!`);
            return { success: true, user: currentUser };
        } else {
            const error = await response.json();
            showError(error.error);
            return { success: false, error: error.error };
        }
    }catch(e){ 
        showError("Network error");
        return { success: false, error: "Network error" }; 
    }
}

async function registerAPI(username, email, password, displayName, hcaptchaResponse){
    try{
        clearAuthToken();
        
        const response = await fetch(`${API_URL}/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ username, email, password, displayName, hcaptchaResponse })
        });
        
        if(response.ok){
            currentUser = await response.json();
            backupUserData(currentUser);
            
            let token = document.cookie.match(/tavian_token=([^;]+)/)?.[1];
            if (token) setAuthToken(token);
            
            showSuccess(`Account created! Welcome ${currentUser.displayName || currentUser.username}!`);
            return { success: true, user: currentUser };
        } else {
            const error = await response.json();
            showError(error.error);
            return { success: false, error: error.error };
        }
    }catch(e){ 
        showError("Network error");
        return { success: false, error: "Network error" }; 
    }
}

async function logoutAPI(){
    try{
        await fetch(`${API_URL}/logout`, { method: 'POST', credentials: 'include' });
    }catch(e){}
    currentUser = null;
    clearAuthToken();
    showInfo("Logged out successfully");
}

async function updateUserAPI(updates){
    if(!currentUser) return false;
    try{
        const token = getAuthToken();
        const response = await fetch(`${API_URL}/user/${currentUser.username}`, {
            method: 'PUT',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': token ? `Bearer ${token}` : ''
            },
            credentials: 'include',
            body: JSON.stringify(updates)
        });
        if(response.ok){
            currentUser = await response.json();
            backupUserData(currentUser);
            return true;
        }
    }catch(e){}
    return false;
}

async function addTransactionAPI(amount, reason, from=null){
    if(!currentUser) return false;
    try{
        const token = getAuthToken();
        const response = await fetch(`${API_URL}/transaction`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': token ? `Bearer ${token}` : ''
            },
            credentials: 'include',
            body: JSON.stringify({ username: currentUser.username, amount, reason, from })
        });
        if(response.ok){
            const result = await response.json();
            currentUser.tavix = result.newBalance;
            backupUserData(currentUser);
            return true;
        }
    }catch(e){}
    return false;
}

async function addNotificationAPI(title, message){
    if(!currentUser) return false;
    try{
        const token = getAuthToken();
        await fetch(`${API_URL}/notification`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': token ? `Bearer ${token}` : ''
            },
            credentials: 'include',
            body: JSON.stringify({ username: currentUser.username, title, message })
        });
        return true;
    }catch(e){ return false; }
}

async function deleteAccountAPI(){
    if(!currentUser) return false;
    try{
        const token = getAuthToken();
        const response = await fetch(`${API_URL}/user/${currentUser.username}`, {
            method: 'DELETE',
            headers: { 'Authorization': token ? `Bearer ${token}` : '' },
            credentials: 'include'
        });
        if(response.ok){
            currentUser = null;
            clearAuthToken();
            showSuccess("Account deleted successfully");
            return true;
        }
    }catch(e){}
    return false;
}

// Redeem Code Function
async function redeemCodeAPI(code){
    if(!currentUser) {
        showError("Please login first");
        return false;
    }
    
    try{
        const token = getAuthToken();
        const response = await fetch(`${API_URL}/redeem`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': token ? `Bearer ${token}` : ''
            },
            credentials: 'include',
            body: JSON.stringify({ code })
        });
        
        if(response.ok){
            const result = await response.json();
            showSuccess(result.message);
            await refreshUserData();
            updateTavixDisplay();
            return true;
        } else {
            const error = await response.json();
            showError(error.error);
            return false;
        }
    } catch(e){
        showError("Failed to redeem code");
        return false;
    }
}

// BADGE SYSTEM
function getUserBadge(username){
    const lowerUsername = username.toLowerCase();
    if(lowerUsername === "realgysj") return { icon: "👑", class: "owner" };
    if(lowerUsername === "plstealme2") return { icon: "🛡️", class: "admin" };
    return null;
}

function renderBadge(username){
    const badge = getUserBadge(username);
    if(badge) return `<span class="badge ${badge.class}">${badge.icon}</span>`;
    return "";
}

// UI Update Functions
function updateTavixDisplay(){
    const b = currentUser?.tavix || 0;
    ["tavixBalance","tavixBalanceProfile","dropdownBalance","globalSettingsTAVIX"].forEach(id=>{
        const e=document.getElementById(id);
        if(e) e.innerHTML=id==="dropdownBalance"?`${formatTavix(b)} ⌬`:formatTavix(b);
    });
}

async function addTransaction(amount, reason, from=null){
    if(await addTransactionAPI(amount, reason, from)){
        if(amount>0&&!from) addNotification("💰 TAVIX Purchased", `+${formatTavix(amount)} TAVIX`);
        if(from) addNotification("🎁 Gift Received", `${from} sent you ${formatTavix(amount)} TAVIX!`);
        updateTavixDisplay();
        return true;
    }
    return false;
}

async function addNotification(title, message){
    await addNotificationAPI(title, message);
    updateNotifications();
}

function updateNotifications(){
    if(!currentUser) return;
    const unread = currentUser.notifications?.filter(n=>!n.read).length||0;
    ["notificationCount","notificationCountProfile"].forEach(id=>{
        const e=document.getElementById(id);
        if(e) e.textContent=unread;
    });
    const container=document.getElementById("notificationList");
    if(container){
        if(!currentUser.notifications||currentUser.notifications.length===0){
            container.innerHTML='<div class="empty-notifications">🔔 No notifications</div>';
        }else{
            container.innerHTML=currentUser.notifications.map(n=>`<div class="notification-item ${!n.read?'unread':''}" onclick="markRead(${n.id})"><div class="notification-icon">${n.title.includes("TAVIX")?"💰":"📢"}</div><div class="notification-content"><div class="notification-title">${escapeHtml(n.title)}</div><div class="notification-message">${escapeHtml(n.message)}</div><div class="notification-time">${new Date(n.time).toLocaleString()}</div></div></div>`).join('');
        }
    }
}

async function markRead(id){
    if(currentUser && currentUser.notifications){
        const n = currentUser.notifications.find(x=>x.id===id);
        if(n) n.read=true;
        await updateUserAPI({ notifications: currentUser.notifications });
        updateNotifications();
    }
}

// SAVED ACCOUNTS
function getSaved(){return JSON.parse(localStorage.getItem("savedAccounts"))||[];}
function saveAccount(acc){let s=getSaved();if(!s.find(a=>a.username===acc.username)){s.push({username:acc.username,displayName:acc.displayName||acc.username,email:acc.email,lastLogin:new Date().toISOString(),color:'#'+Math.floor(Math.random()*16777215).toString(16)});localStorage.setItem("savedAccounts",JSON.stringify(s));}renderSaved();}
function removeSaved(user){let s=getSaved().filter(a=>a.username!==user);localStorage.setItem("savedAccounts",JSON.stringify(s));renderSaved();}
function quickLogin(user){document.getElementById("loginUsername").value=user;showAuthForm('login');}
function renderSaved(){const c=document.getElementById("savedAccountsList");if(!c)return;const s=getSaved();if(s.length===0){c.innerHTML='<div style="color:#999">No saved accounts</div>';return;}c.innerHTML=s.map(acc=>`<div class="saved-account-btn" onclick="quickLogin('${escapeHtml(acc.username)}')"><div class="saved-account-avatar" style="background:${acc.color||'#667eea'}">${(acc.displayName.charAt(0)||acc.username.charAt(0)).toUpperCase()}</div><div class="saved-account-info"><div class="saved-account-name">${escapeHtml(acc.displayName)}</div><div class="saved-account-username">@${escapeHtml(acc.username)}</div></div><span class="remove-account" onclick="event.stopPropagation(); removeSaved('${escapeHtml(acc.username)}')">✕</span></div>`).join('');}

function escapeHtml(s){if(!s)return '';return s.replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;});}
function formatEmail(e){if(!e)return '-';const a=e.indexOf('@');if(a<=4)return e.substring(0,a)+'***'+e.substring(a);return e.substring(0,4)+'***'+e.substring(a);}

// PROFILE FUNCTIONS
function navigateToUserProfile(userId) {
    if (!userId) return;
    updateHash(`#${userId}-profile`);
    
    if (currentUser && currentUser.id === userId) {
        showProfile();
    } else {
        showOtherUserProfile(userId);
    }
}

async function showOtherUserProfile(userId) {
    await fetchAllUsers();
    const user = allUsers.find(u => u.id === userId);
    
    if (!user) {
        showError("User not found");
        navigateTo("home");
        return;
    }
    
    document.getElementById("authPage").style.display = "none";
    document.getElementById("homePage").style.display = "none";
    document.getElementById("tosPage").style.display = "none";
    document.getElementById("deletePage").style.display = "none";
    document.getElementById("profilePage").style.display = "block";
    
    renderOtherUserProfile(user);
}

function renderOtherUserProfile(user) {
    const isOwner = currentUser && currentUser.id === user.id;
    
    const html = `
        <div class="profile-header">
            <img class="profile-pfp" src="https://ui-avatars.com/api/?background=667eea&color=fff&size=120&name=${encodeURIComponent(user.displayName || user.username)}">
            <div>
                <div class="display-name">${escapeHtml(user.displayName || user.username)} ${renderBadge(user.username)}</div>
                <div class="username">@${escapeHtml(user.username)}</div>
                <div class="social-stats">
                    <span>0 Friends</span>
                    <span>2 Followers</span>
                </div>
            </div>
        </div>
        <div class="about-card">
            <div class="card-header">
                <h2>ABOUT</h2>
            </div>
            <p class="about-text">${escapeHtml(user.about || "This user hasn't written anything yet...")}</p>
        </div>
        <div class="profile-stats-grid">
            <div class="stat-card">
                <div class="stat-label">VISITS</div>
                <div class="stat-value">${user.visits || 0}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">JOINED</div>
                <div class="stat-value">${new Date(user.createdAt || Date.now()).toLocaleDateString()}</div>
            </div>
        </div>
        ${!isOwner && currentUser ? `<div style="margin-top:20px; text-align:center;">
            <button class="submit-btn" style="padding:12px 24px; font-size:16px;" onclick="sendGiftToUser('${user.username}')">🎁 Send TAVIX</button>
        </div>` : ''}
    `;
    document.getElementById("profileContent").innerHTML = html;
}

async function sendGiftToUser(username) {
    const amount = prompt(`How much TAVIX to send to ${username}?`, "10");
    if (!amount) return;
    
    const amt = parseInt(amount);
    if (isNaN(amt) || amt <= 0) {
        showError("Enter valid amount");
        return;
    }
    
    if (!currentUser) {
        showError("You must be logged in to send TAVIX");
        navigateTo("signin");
        return;
    }
    
    if ((currentUser.tavix || 0) < amt) {
        showError("Insufficient TAVIX");
        return;
    }
    
    await fetchAllUsers();
    const recipient = allUsers.find(x => x.username === username);
    if (!recipient) {
        showError("User not found");
        return;
    }
    
    if (await addTransactionAPI(-amt, `Gifted ${formatTavix(amt)} TAVIX to @${username}`)) {
        await addTransactionAPI(amt, `Received ${formatTavix(amt)} TAVIX from @${currentUser.username}`, currentUser.username);
        await addNotificationAPI("🎁 Gift Received", `@${currentUser.username} sent you ${formatTavix(amt)} TAVIX!`);
        showSuccess(`Sent ${formatTavix(amt)} TAVIX to @${username}!`);
        updateTavixDisplay();
        
        if (window.location.hash === `#${recipient.id}-profile`) {
            showOtherUserProfile(recipient.id);
        }
    } else {
        showError("Failed to send gift");
    }
}

function showProfile() {
    if (!currentUser) {
        navigateTo("signin");
        return;
    }
    
    document.getElementById("authPage").style.display = "none";
    document.getElementById("homePage").style.display = "none";
    document.getElementById("tosPage").style.display = "none";
    document.getElementById("deletePage").style.display = "none";
    document.getElementById("profilePage").style.display = "block";
    
    renderProfile();
}

function renderProfile(){
    if(!currentUser) return;
    const html = `
        <div class="profile-header">
            <img class="profile-pfp" src="https://ui-avatars.com/api/?background=667eea&color=fff&size=120&name=${encodeURIComponent(currentUser.displayName || currentUser.username)}">
            <div>
                <div class="display-name">${escapeHtml(currentUser.displayName || currentUser.username)} ${renderBadge(currentUser.username)}</div>
                <div class="username">@${escapeHtml(currentUser.username)}</div>
                <div class="social-stats">
                    <span>0 Friends</span>
                    <span>2 Followers</span>
                </div>
            </div>
        </div>
        <div class="about-card">
            <div class="card-header">
                <h2>ABOUT</h2>
                <button class="edit-btn" onclick="editAbout()">Edit</button>
            </div>
            <p class="about-text" id="profileAboutText">${escapeHtml(currentUser.about || "Tell people about yourself...")}</p>
        </div>
        <div class="profile-stats-grid">
            <div class="stat-card">
                <div class="stat-label">VISITS</div>
                <div class="stat-value">${currentUser.visits || 0}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">JOINED</div>
                <div class="stat-value">${new Date(currentUser.createdAt || Date.now()).toLocaleDateString()}</div>
            </div>
        </div>
    `;
    document.getElementById("profileContent").innerHTML = html;
}

async function editAbout(){
    const currentAbout = currentUser?.about || "";
    const about = prompt("Edit your about section:", currentAbout);
    if(about !== null && about !== currentAbout){
        if(await updateUserAPI({ about: about })){
            document.getElementById("profileAboutText").innerHTML = escapeHtml(about);
            showSuccess("About section updated!");
            renderProfile();
        } else {
            showError("Failed to update about section");
        }
    }
}

// Redeem Code Modal Functions
function openRedeemModal(){
    const code = prompt("Enter your TAVIAN redeem code:");
    if(code && code.trim()){
        redeemCodeAPI(code.trim().toUpperCase());
    }
}

// TAVIX Modal Functions with toast notifications
function openBuyModal(){
    closeModals();
    document.getElementById("buyModal").style.display = "flex";
}

function openGiftModal(){
    closeModals();
    document.getElementById("giftModal").style.display = "flex";
}

function openTransactionsModal(){
    closeModals();
    const t = currentUser?.transactions || [];
    const c = document.getElementById("transactionList");
    if(t.length === 0){
        c.innerHTML = '<p style="text-align:center;color:#888">No transactions yet</p>';
    } else {
        c.innerHTML = t.map(tr => `<div class="transaction-item"><span>${new Date(tr.date).toLocaleDateString()} - ${tr.reason}${tr.from ? ` from @${tr.from}` : ""}</span><span class="transaction-amount ${tr.amount > 0 ? "positive" : "negative"}">${tr.amount > 0 ? "+" : ""}${formatTavix(Math.abs(tr.amount))} ⌬</span></div>`).join('');
    }
    document.getElementById("transactionsModal").style.display = "flex";
}

async function buyTAVIX(){
    const s = document.getElementById("buyAmount");
    const a = parseInt(s.value);
    if(await addTransaction(a, `Purchased ${a} TAVIX`)){
        showSuccess(`+${formatTavix(a)} TAVIX added!`);
        closeModals();
        updateTavixDisplay();
    } else {
        showError("Purchase failed");
    }
}

async function sendGift(){
    const un = document.getElementById("giftUsername").value.trim();
    const amt = parseInt(document.getElementById("giftAmount").value);
    if(!un){
        showError("Enter username");
        return;
    }
    if(isNaN(amt) || amt <= 0){
        showError("Enter valid amount");
        return;
    }
    if(!currentUser){
        showError("Not logged in");
        return;
    }
    if((currentUser.tavix || 0) < amt){
        showError("Insufficient TAVIX");
        return;
    }
    await fetchAllUsers();
    const recipient = allUsers.find(x => x.username === un);
    if(!recipient){
        showError("User not found");
        return;
    }
    if(await addTransactionAPI(-amt, `Gifted ${formatTavix(amt)} TAVIX to @${un}`)){
        await addTransactionAPI(amt, `Received ${formatTavix(amt)} TAVIX from @${currentUser.username}`, currentUser.username);
        await addNotificationAPI("🎁 Gift Received", `@${currentUser.username} sent you ${formatTavix(amt)} TAVIX!`);
        showSuccess(`Sent ${formatTavix(amt)} TAVIX to @${un}!`);
        closeModals();

        document.getElementById("giftAmount").value = "";
        updateTavixDisplay();
    } else {
        showError("Failed to send gift");
    }
}

function navigateTo(p, userId = null){
    if(p === "profile" && userId){
        navigateToUserProfile(userId);
    } else if(p === "profile" && !userId && currentUser){
        navigateToUserProfile(currentUser.id);
    } else if(p === "home"){
        if(currentUser){
            showHome();
            updateHash("#home");
        } else {
            showAuth();
            showAuthForm("login");
            updateHash("#signin");
        }
    } else if(p === "settings"){
        if(currentUser){
            openSettings();
        } else {
            showAuth();
            showAuthForm("login");
            updateHash("#signin");
        }
    } else if(p === "wiki-tos"){
        showTOS();
        updateHash("#wiki-tos");
    } else if(p === "delete"){
        if(currentUser){
            showDelete();
        } else {
            showAuth();
            showAuthForm("login");
            updateHash("#signin");
        }
    } else if(p === "signin"){
        showAuth();
        showAuthForm("login");
        updateHash("#signin");
    }
}

function updateHash(h){
    history.pushState(null, null, h);
}

async function handleRoute(){
    const h = window.location.hash;
    await fetchAllUsers();
    
    const profileMatch = h.match(/^#(\d+)-profile$/);
    if(profileMatch){
        const userId = parseInt(profileMatch[1]);
        if(currentUser && currentUser.id === userId){
            showProfile();
        } else {
            await showOtherUserProfile(userId);
        }
        return;
    }
    
    if(h === "#wiki-tos"){ showTOS(); return; }
    if(h === "#delete"){
        if(currentUser){ showDelete(); }
        else { showAuth(); showAuthForm("login"); updateHash("#signin"); }
        return;
    }
    if(h === "#settings"){
        if(currentUser){ showHome(); openSettings(); }
        else { showAuth(); showAuthForm("login"); updateHash("#signin"); }
        return;
    }
    
    if(currentUser){
        showHome();
        if(window.location.hash !== "#home") updateHash("#home");
    } else {
        showAuth();
        showAuthForm("login");
        if(window.location.hash !== "#signin") updateHash("#signin");
    }
}

function showAuthForm(t){
    const lf=document.getElementById("loginForm"),sf=document.getElementById("signupForm");
    const lt=document.getElementById("loginTab"),st=document.getElementById("signupTab");
    lf.classList.remove("active");sf.classList.remove("active");
    lt.classList.remove("active");st.classList.remove("active");
    if(t==="login"){lf.classList.add("active");lt.classList.add("active");}
    else{sf.classList.add("active");st.classList.add("active");if(typeof hcaptcha !== 'undefined') hcaptcha.reset();}
    document.getElementById("authError").textContent="";
}

async function updateSearchDropdown(){
    const q=document.getElementById("globalSearchInput").value.trim().toLowerCase();
    const d=document.getElementById("globalSearchDropdown");
    if(q===""){d.style.display="none";return;}
    await fetchAllUsers();
    const players=allUsers.filter(p=>p.username.toLowerCase().includes(q)||(p.displayName&&p.displayName.toLowerCase().includes(q)));
    if(players.length===0){d.style.display="none";return;}
    let html='<div class="dropdown-section"><h4>👥 PLAYERS</h4>';
    players.forEach(p=>{html+=`<div class="dropdown-item" onclick="selectPlayer('${escapeHtml(p.username)}')"><img src="https://ui-avatars.com/api/?background=667eea&color=fff&size=40&name=${encodeURIComponent(p.displayName||p.username)}" style="width:40px;height:40px;border-radius:50%;"><div>${escapeHtml(p.displayName||p.username)} ${renderBadge(p.username)}<br><small>@${escapeHtml(p.username)}</small></div></div>`;});
    html+=`</div>`;d.innerHTML=html;d.style.display="block";
}

function selectPlayer(user){closeSearch();viewProfile(user);}
function handleSearchKey(e){if(e.key==="Enter")performSearch();}

async function performSearch(){
    const q=document.getElementById("globalSearchInput").value.trim().toLowerCase();
    if(!q)return;
    await fetchAllUsers();
    const players=allUsers.filter(p=>p.username.toLowerCase().includes(q)||(p.displayName&&p.displayName.toLowerCase().includes(q)));
    const r=document.getElementById("globalSearchResults");
    if(players.length===0){
        r.innerHTML='<div class="empty-games">No players found</div>';
    }else{
        r.innerHTML=`<div class="results-section"><h3>👥 PLAYERS</h3><div class="players-grid">${players.map(p=>`<div class="player-card" onclick="closeSearch();viewProfile('${escapeHtml(p.username)}')"><img class="player-avatar" src="https://ui-avatars.com/api/?background=667eea&color=fff&size=60&name=${encodeURIComponent(p.displayName||p.username)}"><div><div class="player-display-name">${escapeHtml(p.displayName||p.username)} ${renderBadge(p.username)}</div><div class="player-username">@${escapeHtml(p.username)}</div></div></div>`).join('')}</div></div>`;
    }
    r.style.display="block";
    document.getElementById("globalSearchDropdown").style.display="none";
}

async function viewProfile(username){
    const user = allUsers.find(u => u.username === username);
    if(user){
        navigateToUserProfile(user.id);

}

// Forms
document.getElementById("signupForm")?.addEventListener("submit", async function(e){
    e.preventDefault();
    const un = document.getElementById("signupUsername").value.trim();
    const em = document.getElementById("signupEmail").value.trim();
    const pw = document.getElementById("signupPassword").value;
    const cf = document.getElementById("signupConfirm").value;
    const tos = document.getElementById("tosAgree").checked;
    const err = document.getElementById("authError");
    
    if(!tos){ err.textContent = "You must agree to the Terms of Service"; return; }
    
    const hcaptchaResponse = hcaptcha.getResponse();
    if(!hcaptchaResponse){
        err.textContent = "Please complete the image puzzle to verify you're human";
        return;
    }
    
    if(un.length < 3){ err.textContent = "Username must be at least 3 characters"; return; }
    if(pw.length < 8){ err.textContent = "Password must be at least 8 characters"; return; }
    if(pw !== cf){ err.textContent = "Passwords don't match"; return; }
    if(!em.includes("@")){ err.textContent = "Please enter a valid email address"; return; }
    
    const result = await registerAPI(un, em, pw, un, hcaptchaResponse);
    if(result.success){
        saveAccount({username: un, displayName: un, email: em});
        navigateTo("home");
    } else {
        err.textContent = result.error;
        hcaptcha.reset();
    }
});

document.getElementById("loginForm")?.addEventListener("submit", async function(e){
    e.preventDefault();
    const un = document.getElementById("loginUsername").value.trim();
    const pw = document.getElementById("loginPassword").value;
    const result = await loginAPI(un, pw);
    if(result.success){
        saveAccount({username: un, displayName: result.user.displayName || un, email: result.user.email});
        navigateTo("home");
    } else {
        document.getElementById("authError").textContent = result.error;
    }
});
